services:
  postgres:
    image: postgres:16-alpine
    container_name: allyHomework
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: homework
    ports:
      - "5432:5432"
    volumes:
      - todo_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d homework"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: allyApi
    restart: unless-stopped
    environment:
      # point the API container to the postgres service in compose
      DATABASE_URL: "postgres://admin:todo@postgres:5432/homework?sslmode=disable"
    depends_on:
      - postgres
    # map container port 8080 -> host port 8081 so it can run alongside a local server
    ports:
      - "8081:8080"

  web:
    image: nginx:alpine
    container_name: allyWeb
    restart: unless-stopped
    volumes:
      - ./web:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  todo_pgdata:
# no change
